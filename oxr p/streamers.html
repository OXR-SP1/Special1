<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* إعدادات الخلفية العامة لـ سبيشل */
        body {
            background-color: #06191a; /* اللون الداكن الأساسي */
            background-image: radial-gradient(circle at center top, #0b283b 0%, #0d061a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        /* تنسيق العنوان مثل صورة صناع المحتوى */
        .section-header {
            margin-bottom: 50px;
        }

        .section-header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .section-header p {
            color: #55d7f7;
            font-family: monospace;
            font-size: 1.1rem;
        }

        /* شبكة البطاقات */
        .creators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        /* تصميم البطاقة الاحترافي */
        .creator-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px 20px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .creator-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.07);
            border-color: #55d7f7;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* حلقة النيون حول الصورة مثل تصميم سبيشل */
        .avatar-ring {
            width: 105px;
            height: 105px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #44efe1 0%, #55f7f7 100%);
            box-shadow: 0 0 15px rgba(68, 142, 239, 0.5);
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #081b26;
            background: #1a1a1a;
        }

        .creator-name {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 15px 0 5px;
            color: #ffffff;
        }

        .creator-role {
            font-size: 0.9rem;
            color: #8da9bb;
            margin-bottom: 25px;
        }

        /* زر Follow المضيء */
        .follow-btn {
            background: linear-gradient(90deg, #44e9ef, #44f3ff);
            border: none;
            color: white;
            padding: 10px 35px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(68, 114, 239, 0.3);
        }

        .follow-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(68, 239, 210, 0.6);
        }

    </style>
</head>
